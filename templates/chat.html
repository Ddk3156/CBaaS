<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Ather-Bot</title>
    <style>
        /* Import Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background: url('static/background.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Chat Container */
        .chat-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 1s ease-in-out;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .small-logo {
            width: 80px;
            margin-bottom: 10px;
        }

        h2 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            font-family: fangsong;
        }

        /* Chat Box */
        .chat-box {
            width: 100%;
            height: 275px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-family: 'ui-rounded';
            font-size: larger;
            color: #fff;
            margin-bottom: 15px;
        }

        .bot-message, .user-message {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 5px 0;
        }

        .user-message {
            text-align: right;
            background: rgba(0, 242, 254, 0.6);
            color: black;
        }

        /* Input Field */
        input {
            width: calc(100% - 20px);
            padding: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            transition: all 0.3s;
            font-family: 'ui-rounded';
        }

        input:focus {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Button */
        button {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            padding: 12px 18px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-family: cursive;
        }

        button:hover {
            transform: scale(1.08);
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-container {
            display: flex; /* Use flexbox to align input and button */
            width: 100%; /* Ensure it takes full width of chat container */
        }

        input {
            width: calc(100% - 100px); /* Adjust width to make room for the button */
            padding: 10px;
            border: none;
            border-radius: 5px 0 0 5px; /* Rounded corners on left only */
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            transition: all 0.3s;
            font-family: 'ui-rounded';
        }

        button {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            padding: 12px 18px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 0 8px 8px 0; /* Rounded corners on right only */
            cursor: pointer;
            transition: all 0.3s;
            margin: 0; /* Remove top margin */
            font-family: cursive;
        }

        .chat-box {
            height: 275px;
            width: 100%;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.2); /* Keep the chat box background */
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-family: 'ui-rounded';
            font-size: larger;
            color: #fff;
            margin-bottom: 15px;
        }

        .bot-message, .user-message {
            background: rgba(0, 0, 0, 0.3); /* Uniform background for all messages */
            padding: 10px;
            border-radius: 5px; /* Less rounded corners */
            margin: 5px 0;
            word-wrap: break-word; /* Prevents long words from breaking layout */
        }

        .user-message {
            text-align: right; /* Keep user messages aligned right */
        }

    </style>
</head>
<body>
    <div class="chat-container">
         <div class="chat-box">
            {% if user_message %}
                <p class="user-message">{{ user_message }}</p>
                <p class="bot-message">{{ bot_message }}</p>
            {% else %}
                <p class="bot-message">Hello! How can I help you?</p>
            {% endif %}
        </div>
        <form action="/chatb" method="post">
            <input type="text" name="user-input" placeholder="Type a message..." required>
            <button type="submit">Send</button>
        </form>
    </div>
    <script src="script.js"></script> 
</body>
</html>
