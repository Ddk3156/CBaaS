<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign Up - AI Chatbot</title>
        <style>
            body {
                font-family: "Playfair Display", serif;
                margin: 0;
                padding: 0;
                background: url("/static/background.jpg") no-repeat center
                    center/cover;
                color: white;
                text-align: center;
                overflow-x: hidden;
            }

            h1,
            h2,
            h3 {
                font-family: "Playfair Display", serif;
                font-weight: 700;
            }

            p {
                font-family: "Playfair Display", serif;
                font-weight: 400;
                line-height: 1.6;
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                backdrop-filter: blur(10px);
                background: rgba(0, 0, 0, 0.5);
                z-index: -1;
            }

            @keyframes waveMove {
                from {
                    background-position: 0 0;
                }
                to {
                    background-position: 100% 0;
                }
            }

            .animated-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: url("wave.png") repeat-x bottom;
                opacity: 0.3;
                animation: waveMove 10s linear infinite;
                z-index: -1;
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes float {
                0% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-10px);
                }
                100% {
                    transform: translateY(0);
                }
            }

            .loginrobot-container {
                width: 400px;
                height: 400px;
                display: flex;
                justify-content: center;
                align-items: center;
                position: absolute;
                right: 5%;
                top: 50%;
                transform: translateY(-50%);
            }

            .loginrobot-container img {
                width: 100%;
                height: auto;
                animation: float 3s infinite ease-in-out;
            }

            .background {
                position: relative;
                width: 100%;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .signup-container {
                width: 400px;
                padding: 30px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 15px;
                backdrop-filter: blur(12px);
                box-shadow: 0px 5px 20px rgba(255, 255, 255, 0.2);
                text-align: center;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                animation: fadeInUp 1s ease-in-out;
            }

            .input-group {
                margin: 10px 0;
                text-align: left;
            }

            label {
                display: block;
                font-size: 14px;
                margin-bottom: 5px;
            }

            input {
                width: 100%;
                padding: 15px;
                border: none;
                border-radius: 8px;
                outline: none;
                font-size: 18px;
            }

            .signup-btn {
                width: 100%;
                padding: 15px;
                border: none;
                border-radius: 30px;
                background: linear-gradient(45deg, #6b73ff, #9a76ff);
                color: white;
                font-size: 20px;
                cursor: pointer;
                transition: transform 0.3s, box-shadow 0.3s;
            }

            .signup-btn:hover {
                transform: scale(1.07);
                box-shadow: 0px 4px 20px rgba(255, 255, 255, 0.3);
            }

            .login-text {
                margin-top: 15px;
                font-size: 14px;
                color: white;
            }

            .login-text a {
                color: #ffcc00;
                text-decoration: none;
                font-weight: bold;
                transition: color 0.3s;
            }

            .login-text a:hover {
                color: #ff9900;
            }
        </style>
    </head>
    <body>
        <div class="overlay"></div>
        <div class="animated-bg"></div>

        <div class="background">
            <div class="loginrobot-container">
                <img src="/static/login-robo.png" alt="AI Robot" />
            </div>

            <div class="signup-container">
                <h2>Sign Up</h2>
                <form id="signupForm">
                    <div class="input-group">
                        <label for="fullname">Full Name</label>
                        <input
                            type="text"
                            id="fullname"
                            name="fullname"
                            placeholder="Enter your full name"
                            required
                        />
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your email"
                            required
                        />
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        />
                    </div>
                    <button
                        type="submit"
                        class="signup-btn"
                        onclick="location.href='/home'"
                    >
                        Sign Up
                    </button>
                </form>
                <p class="login-text">
                    Already have an account? <a href="/login.html">Login</a>
                </p>
            </div>
        </div>
        <script>
    document.getElementById("signupForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !password) {
        alert("Please fill in all fields.");
        return;
      }

      if (!emailRegex.test(email)) {
        alert("Please enter a valid email address.");
        return;
      }

      if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }

      fetch("http://localhost:5000/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.text())
      .then(response => {
  console.log("Server response:", response); // Add this line
  if (response === "Signup Successful") {
    window.location.href = "index2";
  } else {
    alert(response);
  }
})
    });
    
     function goBack() {
            window.history.back();
        }
  </script>
    </body>
</html>
